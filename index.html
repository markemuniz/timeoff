<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTA Time-Off Calendar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  :root {
    --red: #e63000;
    --red-dark: #c42800;
    --cream: #f5f0e8;
    --cream-dark: #ece5d6;
    --cream-border: #d8cfbb;
    --text: #1a1208;
    --text-secondary: #5a4e3a;
    --muted: #9a8e7a;
    --surface: #ffffff;
    --bg: #f7f3ec;
    --personal: #6b3fa0;
    --personal-bg: #f2ecfa;
    --unpaid: #1a5f80;
    --unpaid-bg: #e5f3f9;
    --holiday: #c42800;
    --holiday-bg: #fdecea;
    --other: #2a6e42;
    --other-bg: #eaf5ee;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER / LOGO BAR */
  .logo-bar {
    background: var(--red);
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
  }
  .logo-bar img {
    height: 90px;
    display: block;
  }

  /* TOOL TITLE BAR */
  .title-bar {
    background: var(--cream);
    border-bottom: 2px solid var(--cream-border);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    flex-shrink: 0;
  }
  .title-bar-label {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* SUMMARY BAR */
  .summary-bar {
    padding: 10px 32px;
    background: var(--red);
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .stat { display: flex; align-items: baseline; gap: 7px; }
  .stat-val { font-weight: 700; font-size: 1.15rem; color: var(--cream); }
  .stat-label { font-weight: 700; font-size: 0.72rem; color: rgba(245,240,232,0.75); text-transform: uppercase; letter-spacing: 0.06em; }

  /* CONTROLS */
  .controls {
    padding: 10px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--cream-border);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  select {
    background: var(--surface);
    border: 1.5px solid var(--cream-border);
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 5px 10px;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--red); }

  .legend { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-left: auto; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* NAV BAR */
  .nav-bar {
    padding: 10px 32px;
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--cream-border);
    flex-shrink: 0;
  }

  .nav-btn {
    background: none;
    border: 1.5px solid var(--cream-border);
    color: var(--text-secondary);
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 5px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .nav-btn:hover { border-color: var(--red); color: var(--red); background: #fff5f3; }

  .month-label {
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--text);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .view-toggle {
    margin-left: auto;
    display: flex;
    border: 1.5px solid var(--cream-border);
    border-radius: 4px;
    overflow: hidden;
  }
  .view-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    padding: 5px 14px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .view-btn.active { background: var(--red); color: #fff; }
  .view-btn:hover:not(.active) { background: var(--cream); color: var(--text); }

  /* MAIN CONTENT AREA */
  #mainContent { flex: 1; overflow-y: auto; }

  /* CALENDAR */
  .calendar-grid { padding: 18px 32px 32px; }

  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 3px;
  }
  .day-header {
    text-align: center;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 6px 0;
  }

  .calendar-weeks { display: flex; flex-direction: column; gap: 3px; }

  /* Each week = a positioned container with the day-cell grid behind and event lanes floating above */
  .calendar-week {
    position: relative;
    min-height: 112px;
  }

  /* Day cell grid — background layer */
  .week-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    height: 100%;
    min-height: 112px;
  }

  .calendar-day {
    background: var(--surface);
    border: 1.5px solid var(--cream-border);
    border-radius: 5px;
    padding: 7px 7px 24px 7px;
    min-height: 112px;
    cursor: default;
    transition: border-color 0.1s;
  }
  .calendar-day:hover { border-color: #b0a090; }
  .calendar-day.other-month { background: var(--cream); opacity: 0.6; }
  .calendar-day.today { border-color: var(--red); border-width: 2px; }
  .calendar-day.today .day-num { color: var(--red); }

  .day-num {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
  }

  /* Event lanes layer — floats above the day grid */
  .week-events {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
  }

  /* A single event lane row — each record gets one lane slot */
  .event-lane {
    position: absolute;
    left: 0;
    right: 0;
    height: 20px;
    pointer-events: none;
  }

  /* The visible event block inside a lane */
  .cal-event {
    position: absolute;
    height: 22px;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: opacity 0.12s;
    pointer-events: all;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    border-radius: 0;
    border-left: none;
  }
  /* Caps control rounding and left border */
  .cal-event.cap-start { border-left: 3px solid; border-radius: 4px 0 0 4px; }
  .cal-event.cap-end   { border-radius: 0 4px 4px 0; }
  .cal-event.cap-start.cap-end { border-radius: 4px; }
  .cal-event:hover { opacity: 0.78; }

  .overflow-count {
    position: absolute;
    bottom: 4px;
    left: 4px;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    pointer-events: all;
    background: var(--surface);
    padding: 0 3px;
    border-radius: 2px;
  }
  .overflow-count:hover { color: var(--text-secondary); }

  /* LIST VIEW */
  .list-view { padding: 22px 32px; }

  .list-month-group { margin-bottom: 30px; }
  .list-month-title {
    font-weight: 700;
    font-size: 0.88rem;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--red);
    margin-bottom: 8px;
  }

  .list-header {
    display: grid;
    grid-template-columns: 160px 150px 100px 100px 70px 1fr;
    gap: 12px;
    padding: 5px 8px 8px;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    border-bottom: 1px solid var(--cream-border);
    margin-bottom: 2px;
  }

  .list-row {
    display: grid;
    grid-template-columns: 160px 150px 100px 100px 70px 1fr;
    gap: 12px;
    padding: 8px 8px;
    border-bottom: 1px solid var(--cream-border);
    align-items: center;
    font-size: 0.82rem;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.1s;
  }
  .list-row:hover { background: var(--cream); }

  .type-badge {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 3px;
    display: inline-block;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .type-badge.Personal { background: var(--personal-bg); color: var(--personal); }
  .type-badge.Unpaid { background: var(--unpaid-bg); color: var(--unpaid); }
  .type-badge.Holiday { background: var(--holiday-bg); color: var(--holiday); }
  .type-badge.Other { background: var(--other-bg); color: var(--other); }

  .name-cell { font-weight: 700; color: var(--text); }
  .date-cell { font-weight: 700; color: var(--text-secondary); }
  .hours-cell { font-weight: 700; color: var(--red); }
  .src-cell { font-weight: 700; color: var(--muted); font-size: 0.72rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,18,8,0.5);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 2px solid var(--cream-border);
    border-radius: 8px;
    padding: 24px 28px;
    max-width: 460px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }

  .modal-header {
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--red);
  }

  .modal-row {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    font-size: 0.82rem;
    border-bottom: 1px solid var(--cream-border);
    gap: 12px;
  }
  .modal-label { color: var(--muted); font-weight: 700; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .modal-val { color: var(--text); text-align: right; font-weight: 700; }

  .modal-close {
    margin-top: 18px;
    background: var(--red);
    border: none;
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 7px 18px;
    border-radius: 4px;
    cursor: pointer;
    float: right;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: opacity 0.15s;
  }
  .modal-close:hover { opacity: 0.85; }

  /* UPLOAD FOOTER */
  .upload-footer {
    background: var(--cream);
    border-top: 2px solid var(--cream-border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .upload-footer-label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .upload-btn {
    background: var(--red);
    color: #fff;
    border: none;
    padding: 8px 18px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .upload-btn:hover { opacity: 0.88; }
  #fileInput { display: none; }

  .file-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .file-tag {
    background: #fff5f3;
    border: 1.5px solid #f0c8c0;
    padding: 3px 10px;
    font-size: 0.73rem;
    font-weight: 700;
    color: var(--red-dark);
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .file-tag .remove { cursor: pointer; color: #c08080; font-size: 1rem; line-height: 1; font-weight: 700; }
  .file-tag .remove:hover { color: var(--red); }

  /* EMPTY */
  .empty { padding: 60px 36px; text-align: center; }
  .empty-icon { font-size: 2.5rem; margin-bottom: 16px; }
  .empty-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; color: var(--text); text-transform: uppercase; letter-spacing: 0.06em; }
  .empty-sub { font-size: 0.82rem; font-weight: 700; line-height: 1.7; color: var(--muted); }

  .drop-active { outline: 3px dashed var(--red); outline-offset: -4px; }
</style>
</head>

<script>

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const STORE_KEY = 'tta-timeoff-v1';

let allRecords = [];
let sourceFiles = [];
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let currentView = 'calendar';

// --- PERSISTENCE: save to Firebase ---
function saveToFirebase() {
  // Serialize dates as ISO strings for JSON round-trip
  const payload = {
    sourceFiles,
    records: allRecords.map(r => ({
      ...r,
      start: r.start instanceof Date ? r.start.toISOString() : r.start,
      end:   r.end   instanceof Date ? r.end.toISOString()   : r.end,
    }))
  };
  db.ref(STORE_KEY).set(payload).catch(err => console.warn('Firebase save error:', err));
}

// --- PERSISTENCE: load from Firebase on startup ---
function loadFromFirebase() {
  db.ref(STORE_KEY).once('value').then(snapshot => {
    const data = snapshot.val();
    if (!data || !data.records || data.records.length === 0) return;
    allRecords = data.records.map(r => ({
      ...r,
      start: new Date(r.start),
      end:   new Date(r.end),
    }));
    sourceFiles = data.sourceFiles || [];
    renderFileTags();
    rebuildFilters();
    updateSummaryBar();
    showControls();
    render();
    showToast('Loaded ' + allRecords.length + ' saved requests');
  }).catch(err => console.warn('Firebase load error:', err));
}

// --- TOAST NOTIFICATION ---
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1208;color:#f5f0e8;font-family:Arial,sans-serif;font-weight:700;font-size:0.8rem;padding:9px 20px;border-radius:5px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

document.getElementById('fileInput').addEventListener('change', e => {
  [...e.target.files].forEach(readFile);
  e.target.value = '';
});

document.body.addEventListener('dragover', e => { e.preventDefault(); document.body.classList.add('drop-active'); });
document.body.addEventListener('dragleave', () => document.body.classList.remove('drop-active'));
document.body.addEventListener('drop', e => {
  e.preventDefault();
  document.body.classList.remove('drop-active');
  [...e.dataTransfer.files].forEach(readFile);
});

function readFile(file) {
  if (sourceFiles.find(f => f.name === file.name)) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'binary', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      const records = parseRows(rows, file.name);
      const approvedOnly = records.filter(r => r.status === 'Approved');
      allRecords.push(...approvedOnly);
      sourceFiles.push({ name: file.name, count: approvedOnly.length });
      renderFileTags();
      rebuildFilters();
      updateSummaryBar();
      showControls();
      render();
      saveToFirebase();
      showToast('Saved ' + approvedOnly.length + ' approved requests from ' + file.name.replace(/\.[^.]+$/, ''));
    } catch(err) {
      alert('Could not parse ' + file.name + '. Make sure it is a valid time-off export.');
    }
  };
  reader.readAsBinaryString(file);
}

function parseRows(rows, source) {
  return rows.map(r => {
    const get = (keys) => {
      const k = Object.keys(r).find(k => keys.some(q => k.toLowerCase().includes(q.toLowerCase())));
      return k ? String(r[k]).trim() : '';
    };
    const parseDate = (val) => {
      if (!val || val === '') return null;
      if (val instanceof Date) return val;
      const d = new Date(val);
      return isNaN(d) ? null : d;
    };
    return {
      name: get(['name']),
      type: get(['type']),
      start: parseDate(r['Start Date'] || r['start date'] || r['StartDate'] || r['start']),
      end: parseDate(r['End Date'] || r['end date'] || r['EndDate'] || r['end']),
      paidHrs: parseFloat(r['Paid Hours'] || r['paid hours'] || 0) || 0,
      unpaidHrs: parseFloat(r['Unpaid Hours'] || r['unpaid hours'] || 0) || 0,
      status: get(['status']),
      approvedBy: get(['approved', 'denied']),
      message: get(['message', 'note', 'comment']),
      source: source,
    };
  }).filter(r => r.name && r.start && r.end);
}

function removeFile(name) {
  allRecords = allRecords.filter(r => r.source !== name);
  sourceFiles = sourceFiles.filter(f => f.name !== name);
  renderFileTags();
  rebuildFilters();
  updateSummaryBar();
  if (sourceFiles.length === 0) {
    document.getElementById('controls').style.display = 'none';
    document.getElementById('navBar').style.display = 'none';
    document.getElementById('summaryBar').style.display = 'none';
    document.getElementById('mainContent').innerHTML = '<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">No Reports Loaded</div><div class="empty-sub">Use the Upload button below to add one or more<br>time-off request exports.</div></div>';
  } else {
    render();
    saveToFirebase();
  }
}

function renderFileTags() {
  document.getElementById('fileTags').innerHTML = sourceFiles.map(f =>
    '<div class="file-tag">' + f.name.replace(/\.[^.]+$/, '') + ' <span class="remove" onclick="removeFile(\'' + f.name.replace(/'/g, "\'") + '\')">×</span></div>'
  ).join('');
}

function rebuildFilters() {
  const names = [...new Set(allRecords.map(r => r.name))].sort();
  const types = [...new Set(allRecords.map(r => r.type))].sort();
  const ns = document.getElementById('filterName');
  const cur = ns.value;
  ns.innerHTML = '<option value="">All employees</option>' + names.map(n => '<option value="' + n + '">' + n + '</option>').join('');
  ns.value = names.includes(cur) ? cur : '';
  const ts = document.getElementById('filterType');
  const curT = ts.value;
  ts.innerHTML = '<option value="">All types</option>' + types.map(t => '<option value="' + t + '">' + t + '</option>').join('');
  ts.value = types.includes(curT) ? curT : '';
  ns.onchange = ts.onchange = () => render();

  // Rebuild employee color legend
  const leg = document.getElementById('employeeLegend');
  if (leg) {
    const sortedNames = [...new Set(allRecords.map(r => r.name))].sort();
    let ci = 0;
    const nameCI = {};
    allRecords.forEach(r => { if (nameCI[r.name] === undefined) nameCI[r.name] = ci++; });
    leg.innerHTML = sortedNames.map(n => {
      const col = EMPLOYEE_COLORS[nameCI[n] % EMPLOYEE_COLORS.length];
      return '<div class="legend-item"><div class="legend-dot" style="background:' + col.border + '"></div>' + n.split(' ')[0] + ' ' + n.split(' ').slice(-1)[0] + '</div>';
    }).join('');
  }
}

function getFiltered() {
  const name = document.getElementById('filterName').value;
  const type = document.getElementById('filterType').value;
  return allRecords.filter(r => (!name || r.name === name) && (!type || r.type === type));
}

function updateSummaryBar() {
  const bar = document.getElementById('summaryBar');
  if (allRecords.length === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  const names = new Set(allRecords.map(r => r.name)).size;
  const totalHrs = allRecords.reduce((s, r) => s + r.paidHrs + r.unpaidHrs, 0);
  bar.innerHTML =
    '<div class="stat"><span class="stat-val">' + allRecords.length + '</span><span class="stat-label">Approved Requests</span></div>' +
    '<div class="stat"><span class="stat-val">' + names + '</span><span class="stat-label">Employees</span></div>' +
    '<div class="stat"><span class="stat-val">' + totalHrs.toLocaleString() + '</span><span class="stat-label">Total Hours Off</span></div>' +
    '<div class="stat"><span class="stat-val">' + sourceFiles.length + '</span><span class="stat-label">Report' + (sourceFiles.length !== 1 ? 's' : '') + ' Loaded</span></div>';
}

function showControls() {
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('navBar').style.display = 'flex';
  updateMonthLabel();
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  updateMonthLabel();
  render();
}

function updateMonthLabel() {
  document.getElementById('monthLabel').textContent = MONTHS[currentMonth] + ' ' + currentYear;
}

function setView(v) {
  currentView = v;
  document.getElementById('btnCal').classList.toggle('active', v === 'calendar');
  document.getElementById('btnList').classList.toggle('active', v === 'list');
  render();
}

function render() {
  if (currentView === 'calendar') renderCalendar();
  else renderList();
}

function typeClass(type) {
  if (/personal/i.test(type)) return 'Personal';
  if (/unpaid/i.test(type)) return 'Unpaid';
  if (/holiday/i.test(type)) return 'Holiday';
  return 'Other';
}

function fmtDate(d) {
  if (!d) return '—';
  return (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear();
}

function daysBetween(start, end) {
  const s = new Date(start); s.setHours(0,0,0,0);
  const e = new Date(end); e.setHours(0,0,0,0);
  const days = [];
  while (s <= e) { days.push(new Date(s)); s.setDate(s.getDate()+1); }
  return days;
}

// Per-employee color palette (12 distinct colors)
const EMPLOYEE_COLORS = [
  { bg: '#dbeafe', fg: '#1e40af', border: '#3b82f6' },
  { bg: '#dcfce7', fg: '#166534', border: '#22c55e' },
  { bg: '#fce7f3', fg: '#9d174d', border: '#ec4899' },
  { bg: '#fef9c3', fg: '#854d0e', border: '#eab308' },
  { bg: '#ede9fe', fg: '#5b21b6', border: '#8b5cf6' },
  { bg: '#ffedd5', fg: '#9a3412', border: '#f97316' },
  { bg: '#cffafe', fg: '#155e75', border: '#06b6d4' },
  { bg: '#fae8ff', fg: '#86198f', border: '#d946ef' },
  { bg: '#d1fae5', fg: '#065f46', border: '#10b981' },
  { bg: '#fee2e2', fg: '#991b1b', border: '#ef4444' },
  { bg: '#e0f2fe', fg: '#075985', border: '#0ea5e9' },
  { bg: '#fdf2f8', fg: '#9d174d', border: '#f472b6' },
  { bg: '#f0fdf4', fg: '#14532d', border: '#4ade80' },
  { bg: '#fefce8', fg: '#713f12', border: '#facc15' },
  { bg: '#f5f3ff', fg: '#4c1d95', border: '#a78bfa' },
  { bg: '#fff7ed', fg: '#7c2d12', border: '#fb923c' },
];

function renderCalendar() {
  const records = getFiltered();
  const today = new Date(); today.setHours(0,0,0,0);

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const prevMonthDays = new Date(currentYear, currentMonth, 0).getDate();

  // Build array of all 7-day weeks covering the month
  const weeks = [];
  let cells = [];
  for (let i = 0; i < firstDay; i++)
    cells.push(new Date(currentYear, currentMonth - 1, prevMonthDays - firstDay + 1 + i));
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push(new Date(currentYear, currentMonth, d));
    if (cells.length === 7) { weeks.push(cells); cells = []; }
  }
  if (cells.length > 0) {
    let nm = 1;
    while (cells.length < 7) cells.push(new Date(currentYear, currentMonth + 1, nm++));
    weeks.push(cells);
  }

  const d0 = d => { const x = new Date(d); x.setHours(0,0,0,0); return x; };
  const inMonth = d => d.getMonth() === currentMonth && d.getFullYear() === currentYear;
  const GAP = 3, DAY_TOP = 28, LANE_H = 22, LANE_GAP = 2;

  // Assign a persistent color index to each unique employee name
  const nameColorMap = {};
  let colorIdx = 0;
  records.forEach(r => { if (nameColorMap[r.name] === undefined) nameColorMap[r.name] = colorIdx++; });

  function renderWeek(weekDates) {
    // For each record that overlaps this week, compute its column span
    const weekStart = d0(weekDates[0]);
    const weekEnd   = d0(weekDates[6]);

    // Gather all records that appear in this week
    const weekRecords = records.filter(r => {
      const rs = d0(r.start), re = d0(r.end);
      return rs <= weekEnd && re >= weekStart;
    });

    // Deduplicate (same person, same dates can appear once per week)
    const seen = new Set();
    const unique = weekRecords.filter(r => {
      const k = r.name + '|' + r.start + '|' + r.end;
      if (seen.has(k)) return false;
      seen.add(k); return true;
    });

    // For each record, determine colStart and colEnd within this week (0-6)
    const spans = unique.map(r => {
      const rs = d0(r.start), re = d0(r.end);
      let colStart = 0, colEnd = 6;
      for (let c = 0; c < 7; c++) {
        const cd = d0(weekDates[c]);
        if (cd < rs) colStart = c + 1;
        if (cd <= re) colEnd = c;
      }
      colEnd = Math.min(colEnd, 6);
      colStart = Math.max(colStart, 0);
      return {
        record: r,
        colStart,
        colEnd,
        isStart: d0(r.start).getTime() >= weekStart.getTime() && d0(r.start).getTime() <= weekEnd.getTime(),
        isEnd:   d0(r.end).getTime() >= weekStart.getTime() && d0(r.end).getTime() <= weekEnd.getTime(),
        colorIdx: nameColorMap[r.name]
      };
    }).filter(s => s.colStart <= s.colEnd);

    // Lane assignment: greedily pack spans into rows
    // lanes[i] = array of {colStart, colEnd} already placed
    const lanes = [];
    const laneAssign = spans.map(span => {
      for (let li = 0; li < lanes.length; li++) {
        const conflict = lanes[li].some(p => p.colStart <= span.colEnd && p.colEnd >= span.colStart);
        if (!conflict) { lanes[li].push(span); return li; }
      }
      lanes.push([span]);
      return lanes.length - 1;
    });

    const laneCount = lanes.length;
    const weekH = Math.max(112, DAY_TOP + laneCount * (LANE_H + LANE_GAP) + 8);

    // Day cells (background layer)
    const dayCells = weekDates.map(date => {
      const isOther = !inMonth(date);
      const isTod = d0(date).getTime() === today.getTime();
      return '<div class="calendar-day' + (isOther ? ' other-month' : '') + (isTod ? ' today' : '') +
        '" style="min-height:' + weekH + 'px"><div class="day-num">' + date.getDate() + '</div></div>';
    }).join('');

    // Event span elements (overlay layer)
    // CSS calc: col width = (100% - 18px) / 7, col left = col * (colWidth + 3px)
    const CW = '(100% - 18px) / 7'; // single column width expression
    const eventHtml = spans.map((span, si) => {
      const li = laneAssign[si];
      const top = DAY_TOP + li * (LANE_H + LANE_GAP);
      const spanCount = span.colEnd - span.colStart + 1;
      // left = colStart * (colW + gap)
      const left = span.colStart === 0 ? '0px'
        : 'calc(' + span.colStart + ' * (' + CW + ' + 3px))';
      // width = spanCount * colW + (spanCount-1) * gap - insets
      const iL = span.isStart ? 3 : 0;
      const iR = span.isEnd ? 3 : 0;
      const widthBase = spanCount === 1
        ? 'calc(' + CW + ' - ' + (iL + iR) + 'px)'
        : 'calc(' + spanCount + ' * (' + CW + ') + ' + ((spanCount-1)*GAP) + 'px - ' + (iL+iR) + 'px)';
      const finalLeft = iL > 0
        ? (span.colStart === 0 ? iL + 'px' : 'calc(' + span.colStart + ' * (' + CW + ' + 3px) + ' + iL + 'px)')
        : left;

      const capClass = (span.isStart ? 'cap-start ' : '') + (span.isEnd ? 'cap-end' : '');
      const ci = span.colorIdx % EMPLOYEE_COLORS.length;
      const col = EMPLOYEE_COLORS[ci];
      const nm = span.record.name.split(' ')[0] + ' ' + span.record.name.split(' ').slice(-1)[0];
      const ridx = allRecords.indexOf(span.record);
      return '<div class="cal-event ' + capClass + '" ' +
        'style="top:' + top + 'px;left:' + finalLeft + ';width:' + widthBase + ';' +
        'background:' + col.bg + ';color:' + col.fg + ';border-left-color:' + col.border + ';" ' +
        'data-ridx="' + ridx + '" onclick="handleCalClick(event)">' + nm + '</div>';
    }).join('');

    return '<div class="calendar-week" style="min-height:' + weekH + 'px">' +
      '<div class="week-days" style="position:absolute;inset:0;display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">' + dayCells + '</div>' +
      '<div class="week-events" style="position:absolute;inset:0;pointer-events:none;">' + eventHtml + '</div>' +
      '</div>';
  }

  let html = '<div class="calendar-grid"><div class="day-headers">' +
    DAYS.map(d => '<div class="day-header">' + d + '</div>').join('') +
    '</div><div class="calendar-weeks">';
  weeks.forEach(w => { html += renderWeek(w); });
  html += '</div></div>';
  document.getElementById('mainContent').innerHTML = html;
}


function renderList() {
  const records = getFiltered();
  if (records.length === 0) {
    document.getElementById('mainContent').innerHTML = '<div class="list-view"><p style="color:var(--muted);font-size:0.82rem;padding-top:8px;">No approved requests match the current filters.</p></div>';
    return;
  }

  const groups = {};
  records.forEach(r => {
    const key = MONTHS[r.start.getMonth()] + ' ' + r.start.getFullYear();
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  const sortedKeys = Object.keys(groups).sort((a, b) => new Date(a) - new Date(b));

  let html = '<div class="list-view">';
  sortedKeys.forEach(key => {
    const recs = groups[key].sort((a, b) => a.start - b.start);
    html += '<div class="list-month-group"><div class="list-month-title">' + key + '</div><div class="list-header"><span>Employee</span><span>Type</span><span>Start</span><span>End</span><span>Hours</span><span>Source</span></div>';
    recs.forEach(r => {
      const tc = typeClass(r.type);
      const hrs = r.paidHrs + r.unpaidHrs;
      html += '<div class="list-row" onclick=\'showModal(' + JSON.stringify(r).replace(/'/g, "\'") + ')\'><span class="name-cell">' + r.name + '</span><span><span class="type-badge ' + tc + '">' + r.type + '</span></span><span class="date-cell">' + fmtDate(r.start) + '</span><span class="date-cell">' + fmtDate(r.end) + '</span><span class="hours-cell">' + hrs + 'h</span><span class="src-cell">' + r.source.replace(/\.[^.]+$/, '') + '</span></div>';
    });
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;
}

function handleCalClick(e) {
  const ridx = parseInt(e.currentTarget.getAttribute('data-ridx'));
  const filtered = getFiltered();
  // ridx is index into allRecords, find the right record
  const r = allRecords[ridx];
  if (r) showModal(r);
}

function showModal(r) {
  document.getElementById('modalName').textContent = r.name;
  const tc = typeClass(r.type);
  document.getElementById('modalBody').innerHTML =
    '<div class="modal-row"><span class="modal-label">Type</span><span class="modal-val"><span class="type-badge ' + tc + '">' + r.type + '</span></span></div>' +
    '<div class="modal-row"><span class="modal-label">Start</span><span class="modal-val">' + fmtDate(new Date(r.start)) + '</span></div>' +
    '<div class="modal-row"><span class="modal-label">End</span><span class="modal-val">' + fmtDate(new Date(r.end)) + '</span></div>' +
    '<div class="modal-row"><span class="modal-label">Paid Hours</span><span class="modal-val">' + r.paidHrs + 'h</span></div>' +
    '<div class="modal-row"><span class="modal-label">Unpaid Hours</span><span class="modal-val">' + r.unpaidHrs + 'h</span></div>' +
    '<div class="modal-row"><span class="modal-label">Approved By</span><span class="modal-val">' + (r.approvedBy || '—') + '</span></div>' +
    (r.message ? '<div class="modal-row"><span class="modal-label">Note</span><span class="modal-val">' + r.message + '</span></div>' : '') +
    '<div class="modal-row"><span class="modal-label">Source</span><span class="modal-val" style="color:var(--muted);font-size:0.72rem">' + r.source + '</span></div>';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('open');
});

function clearAll() {
  if (!confirm('Clear all loaded reports and saved data?')) return;
  allRecords = [];
  sourceFiles = [];
  db.ref(STORE_KEY).remove();
  renderFileTags();
  document.getElementById('controls').style.display = 'none';
  document.getElementById('navBar').style.display = 'none';
  document.getElementById('summaryBar').style.display = 'none';
  document.getElementById('employeeLegend').innerHTML = '';
  document.getElementById('mainContent').innerHTML = '<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">No Reports Loaded</div><div class="empty-sub">Use the Upload button below to add one or more<br>time-off request exports.</div></div>';
  showToast('All data cleared');
}

// Load saved data on startup
loadFromFirebase();
</script>
