<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTA Time-Off Calendar</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --red: #e63000;
      --red-dark: #c42800;
      --cream: #f5f0e8;
      --cream-dark: #ece5d6;
      --cream-border: #d8cfbb;
      --text: #1a1208;
      --text-secondary: #5a4e3a;
      --muted: #9a8e7a;
      --surface: #ffffff;
      --bg: #f7f3ec;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .logo-bar {
      background: var(--red);
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }
    .logo-bar img { height: 90px; display: block; }
    .title-bar {
      background: var(--cream);
      border-bottom: 2px solid var(--cream-border);
      padding: 10px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      flex-shrink: 0;
    }
    .title-bar-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    #fbStatus {
      display: flex;
      align-items: center;
      font-size: 0.73rem;
      font-weight: 700;
      color: var(--muted);
      font-family: Arial, sans-serif;
    }
    .summary-bar {
      padding: 10px 32px;
      background: var(--red);
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .stat { display: flex; align-items: baseline; gap: 7px; }
    .stat-val { font-weight: 700; font-size: 1.15rem; color: var(--cream); }
    .stat-label { font-weight: 700; font-size: 0.72rem; color: rgba(245,240,232,0.75); text-transform: uppercase; letter-spacing: 0.06em; }
    .controls {
      padding: 10px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--cream-border);
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    select {
      background: var(--surface);
      border: 1.5px solid var(--cream-border);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 5px 10px;
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: var(--red); }
    .legend { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-left: auto; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .nav-bar {
      padding: 10px 32px;
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--cream-border);
      flex-shrink: 0;
    }
    .nav-btn {
      background: none;
      border: 1.5px solid var(--cream-border);
      color: var(--text-secondary);
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 5px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .nav-btn:hover { border-color: var(--red); color: var(--red); background: #fff5f3; }
    .month-label {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .view-toggle {
      margin-left: auto;
      display: flex;
      border: 1.5px solid var(--cream-border);
      border-radius: 4px;
      overflow: hidden;
    }
    .view-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      padding: 5px 14px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }
    .view-btn.active { background: var(--red); color: #fff; }
    .view-btn:hover:not(.active) { background: var(--cream); color: var(--text); }
    #mainContent { flex: 1; overflow-y: auto; }
    .calendar-grid { padding: 18px 32px 32px; }
    .day-headers {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 3px;
    }
    .day-header {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 6px 0;
    }
    .calendar-weeks { display: flex; flex-direction: column; gap: 3px; }
    .calendar-week { position: relative; min-height: 112px; }
    .calendar-day {
      background: var(--surface);
      border: 1.5px solid var(--cream-border);
      border-radius: 5px;
      padding: 7px 7px 24px 7px;
      min-height: 112px;
      cursor: default;
      transition: border-color 0.1s;
    }
    .calendar-day:hover { border-color: #b0a090; }
    .calendar-day.other-month { background: var(--cream); opacity: 0.6; }
    .calendar-day.today { border-color: var(--red); border-width: 2px; }
    .calendar-day.today .day-num { color: var(--red); }
    .day-num { font-size: 0.75rem; font-weight: 700; color: var(--muted); }
    .cal-event {
      position: absolute;
      height: 22px;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0 7px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      transition: opacity 0.12s;
      pointer-events: all;
      display: flex;
      align-items: center;
      gap: 4px;
      border-radius: 0;
      border-left: none;
    }
    .cal-event.cap-start { border-left: 3px solid; border-radius: 4px 0 0 4px; }
    .cal-event.cap-end   { border-radius: 0 4px 4px 0; }
    .cal-event.cap-start.cap-end { border-radius: 4px; }
    .cal-event:hover { opacity: 0.78; }
    /* Partial-day clock badge on the event bar */
    .cal-event .time-badge {
      font-size: 0.6rem;
      font-weight: 700;
      opacity: 0.8;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .list-view { padding: 22px 32px; }
    .list-month-group { margin-bottom: 30px; }
    .list-month-title {
      font-weight: 700;
      font-size: 0.88rem;
      color: var(--red);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--red);
      margin-bottom: 8px;
    }
    .list-header {
      display: grid;
      grid-template-columns: 160px 160px 130px 130px 70px 1fr;
      gap: 12px;
      padding: 5px 8px 8px;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      border-bottom: 1px solid var(--cream-border);
      margin-bottom: 2px;
    }
    .list-row {
      display: grid;
      grid-template-columns: 160px 160px 130px 130px 70px 1fr;
      gap: 12px;
      padding: 8px 8px;
      border-bottom: 1px solid var(--cream-border);
      align-items: center;
      font-size: 0.82rem;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.1s;
    }
    .list-row:hover { background: var(--cream); }
    .type-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 3px;
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .type-badge.Personal { background: #f2ecfa; color: #6b3fa0; }
    .type-badge.Unpaid   { background: #e5f3f9; color: #1a5f80; }
    .type-badge.Holiday  { background: #fdecea; color: #c42800; }
    .type-badge.Other    { background: #eaf5ee; color: #2a6e42; }
    /* Partial badge in list */
    .partial-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.68rem;
      font-weight: 700;
      color: #c42800;
      background: #fdecea;
      border: 1px solid #f0c8c0;
      border-radius: 3px;
      padding: 1px 5px;
      margin-left: 4px;
      white-space: nowrap;
    }
    .name-cell { font-weight: 700; color: var(--text); }
    .date-cell { font-weight: 700; color: var(--text-secondary); font-size: 0.78rem; }
    .hours-cell { font-weight: 700; color: var(--red); }
    .src-cell { font-weight: 700; color: var(--muted); font-size: 0.72rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,18,8,0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 2px solid var(--cream-border);
      border-radius: 8px;
      padding: 24px 28px;
      max-width: 460px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .modal-header {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--red);
    }
    .modal-row {
      display: flex;
      justify-content: space-between;
      padding: 7px 0;
      font-size: 0.82rem;
      border-bottom: 1px solid var(--cream-border);
      gap: 12px;
    }
    .modal-label { color: var(--muted); font-weight: 700; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .modal-val { color: var(--text); text-align: right; font-weight: 700; }
    .modal-close {
      margin-top: 18px;
      background: var(--red);
      border: none;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 7px 18px;
      border-radius: 4px;
      cursor: pointer;
      float: right;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: opacity 0.15s;
    }
    .modal-close:hover { opacity: 0.85; }
    .upload-footer {
      background: var(--cream);
      border-top: 2px solid var(--cream-border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .upload-footer-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .upload-btn {
      background: var(--red);
      color: #fff;
      border: none;
      padding: 8px 18px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .upload-btn:hover { opacity: 0.88; }
    #fileInput { display: none; }
    .file-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .file-tag {
      background: #fff5f3;
      border: 1.5px solid #f0c8c0;
      padding: 3px 10px;
      font-size: 0.73rem;
      font-weight: 700;
      color: var(--red-dark);
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .file-tag .remove { cursor: pointer; color: #c08080; font-size: 1rem; line-height: 1; font-weight: 700; }
    .file-tag .remove:hover { color: var(--red); }
    .empty { padding: 60px 36px; text-align: center; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 16px; }
    .empty-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; color: var(--text); text-transform: uppercase; letter-spacing: 0.06em; }
    .empty-sub { font-size: 0.82rem; font-weight: 700; line-height: 1.7; color: var(--muted); }
    .drop-active { outline: 3px dashed var(--red); outline-offset: -4px; }
  </style>
</head>
<body>

<div class="logo-bar">
  <img src="favicon.png" alt="The Travel Agency" style="height:70px;padding:10px 0">
</div>

<div class="title-bar">
  <div class="title-bar-label">Time-Off Calendar &mdash; Approved Requests</div>
  <div id="fbStatus">
    <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#f59e0b;margin-right:6px;flex-shrink:0"></span>Connecting...
  </div>
</div>

<div id="summaryBar" class="summary-bar" style="display:none"></div>

<div class="controls" id="controls" style="display:none">
  <div class="filter-group">
    <span>Employee</span>
    <select id="filterName"><option value="">All employees</option></select>
  </div>
  <div class="filter-group">
    <span>Type</span>
    <select id="filterType"><option value="">All types</option></select>
  </div>
  <div class="legend" id="employeeLegend"></div>
</div>

<div class="nav-bar" id="navBar" style="display:none">
  <button class="nav-btn" onclick="changeMonth(-1)">&#8592; Prev</button>
  <button class="nav-btn" onclick="changeMonth(1)">Next &#8594;</button>
  <div class="month-label" id="monthLabel"></div>
  <div class="view-toggle">
    <button class="view-btn active" id="btnCal" onclick="setView('calendar')">Calendar</button>
    <button class="view-btn" id="btnList" onclick="setView('list')">List</button>
  </div>
</div>

<div id="mainContent">
  <div class="empty">
    <div class="empty-icon">📅</div>
    <div class="empty-title">No Reports Loaded</div>
    <div class="empty-sub">Use the Upload button below to add one or more<br>time-off request exports. Drag and drop works too.</div>
  </div>
</div>

<div class="upload-footer">
  <span class="upload-footer-label">Reports:</span>
  <div class="file-tags" id="fileTags"></div>
  <button class="upload-btn" onclick="document.getElementById('fileInput').click()">+ Upload Report</button>
  <button class="upload-btn" style="background:transparent;border:1.5px solid var(--cream-border);color:var(--text-secondary);" onclick="clearAll()">Clear All</button>
  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" multiple>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header" id="modalName"></div>
    <div id="modalBody"></div>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">Close</button>
    <div style="clear:both"></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBRWr4kMWFu2xURh19AtoCoi8eMLBWvaLA",
  authDomain: "time-off-calendar-37f1e.firebaseapp.com",
  databaseURL: "https://time-off-calendar-37f1e-default-rtdb.firebaseio.com",
  projectId: "time-off-calendar-37f1e",
  storageBucket: "time-off-calendar-37f1e.firebasestorage.app",
  messagingSenderId: "197578292144",
  appId: "1:197578292144:web:8ac826671f4c0a0dd73475",
  measurementId: "G-7QS9B1MGS2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const STORE_KEY = 'tta-timeoff-v2'; // v2: adds startTime/endTime/isPartial fields

let allRecords = [];
let sourceFiles = [];
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let currentView = 'calendar';

// ── Helpers ────────────────────────────────────────────────────────────────

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// Parse a date string as LOCAL midnight (avoids UTC-midnight rollback bug)
function parseLocalDate(val) {
  if (!val || val === '') return null;
  if (val instanceof Date) { const d = new Date(val); d.setHours(0,0,0,0); return d; }
  const s = String(val).trim();
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

// Normalise time string: "3:00 pm" -> "3:00 PM", "" -> ""
function fmtTime(t) {
  if (!t) return '';
  const s = String(t).trim();
  if (!s) return '';
  return s.replace(/\s*(am|pm)\s*$/i, m => ' ' + m.trim().toUpperCase());
}

// Is the time value an all-day boundary? (midnight start or 11:59 pm end)
function isAllDayStart(t) { return !t || /^12:00\s*am$/i.test(String(t).trim()); }
function isAllDayEnd(t)   { return !t || /^11:59\s*pm$/i.test(String(t).trim()); }

function d0(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function fmtDate(d) { if (!d) return '—'; return (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear(); }
function fmtShortDate(d) { if (!d) return '—'; return (d.getMonth()+1) + '/' + d.getDate(); }

function typeClass(type) {
  if (/personal/i.test(type)) return 'Personal';
  if (/unpaid/i.test(type))   return 'Unpaid';
  if (/holiday/i.test(type))  return 'Holiday';
  return 'Other';
}

// ── Firebase ───────────────────────────────────────────────────────────────

function setFirebaseStatus(status) {
  const el = document.getElementById('fbStatus');
  if (!el) return;
  const states = {
    loading: { dot: '#f59e0b', label: 'Connecting...' },
    ok:      { dot: '#22c55e', label: 'Firebase synced' },
    saving:  { dot: '#3b82f6', label: 'Saving...' },
    error:   { dot: '#ef4444', label: 'Firebase error' },
  };
  const s = states[status] || states.ok;
  el.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + s.dot + ';margin-right:6px;flex-shrink:0"></span>' + s.label;
}

function saveToFirebase() {
  setFirebaseStatus('saving');
  const payload = {
    sourceFiles,
    records: allRecords.map(r => ({
      ...r,
      start: r.start instanceof Date ? r.start.toISOString() : r.start,
      end:   r.end   instanceof Date ? r.end.toISOString()   : r.end,
    }))
  };
  db.ref(STORE_KEY).set(payload)
    .then(() => { setFirebaseStatus('ok'); showToast('Saved to Firebase ✓'); })
    .catch(err => { setFirebaseStatus('error'); showToast('Save failed: ' + err.message); });
}

function loadFromFirebase() {
  setFirebaseStatus('loading');
  db.ref(STORE_KEY).once('value').then(snap => {
    const data = snap.val();
    if (!data || !data.records || data.records.length === 0) {
      setFirebaseStatus('ok');
      showToast('Connected — no saved data yet');
      return;
    }
    allRecords = data.records.map(r => {
      // Migrate old records that lack time fields (saved before partial-day support)
      const startTime   = r.startTime   || '';
      const endTime     = r.endTime     || '';
      const startPartial = r.startPartial != null ? r.startPartial : !isAllDayStart(startTime);
      const endPartial   = r.endPartial   != null ? r.endPartial   : !isAllDayEnd(endTime);
      return {
        ...r,
        start: parseLocalDate(r.start),
        end:   parseLocalDate(r.end),
        startTime,
        endTime,
        startPartial,
        endPartial,
        isPartial: startPartial || endPartial,
      };
    });
    sourceFiles = data.sourceFiles || [];
    renderFileTags();
    rebuildFilters();
    updateSummaryBar();
    showControls();
    render();
    setFirebaseStatus('ok');
    showToast('Loaded ' + allRecords.length + ' requests ✓');
  }).catch(err => { setFirebaseStatus('error'); showToast('Load failed: ' + err.message); });
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1208;color:#f5f0e8;font-family:Arial,sans-serif;font-weight:700;font-size:0.8rem;padding:9px 20px;border-radius:5px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.style.opacity = '0', 2500);
}

// ── File ingestion ─────────────────────────────────────────────────────────

document.getElementById('fileInput').addEventListener('change', e => {
  [...e.target.files].forEach(readFile);
  e.target.value = '';
});
document.body.addEventListener('dragover', e => { e.preventDefault(); document.body.classList.add('drop-active'); });
document.body.addEventListener('dragleave', () => document.body.classList.remove('drop-active'));
document.body.addEventListener('drop', e => {
  e.preventDefault();
  document.body.classList.remove('drop-active');
  [...e.dataTransfer.files].forEach(readFile);
});

function readFile(file) {
  if (sourceFiles.find(f => f.name === file.name)) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'binary', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      const records = parseRows(rows, file.name);
      // Only keep Approved — Canceled, Denied, Pending are excluded
      const approved = records.filter(r => /^approved$/i.test(r.status));
      allRecords.push(...approved);
      sourceFiles.push({ name: file.name, count: approved.length });
      renderFileTags();
      rebuildFilters();
      updateSummaryBar();
      showControls();
      render();
      saveToFirebase();
      showToast(approved.length + ' approved requests loaded from ' + file.name.replace(/\.[^.]+$/, ''));
    } catch(err) {
      alert('Could not parse ' + file.name + '. Make sure it is a valid time-off export.\n\n' + err.message);
    }
  };
  reader.readAsBinaryString(file);
}

function parseRows(rows, source) {
  return rows.map(row => {
    // Helper: find a value by exact or partial column name match
    // Exact-match column finder (no fuzzy fallback for ambiguous names)
    const col = (...keys) => {
      const rowKeys = Object.keys(row);
      // 1. Try exact case-insensitive match
      const k = rowKeys.find(k => keys.some(q => k.toLowerCase().trim() === q.toLowerCase().trim()));
      if (k) return String(row[k]).trim();
      // 2. Fallback: partial includes (only for unambiguous keys)
      const k2 = rowKeys.find(k => keys.some(q => q.length > 5 && k.toLowerCase().includes(q.toLowerCase())));
      return k2 ? String(row[k2]).trim() : '';
    };
    // Direct key access for columns with ambiguous names — 'Start Date' vs 'Start Time' etc.
    const getExact = (exactKey) => {
      const k = Object.keys(row).find(k => k.toLowerCase().trim() === exactKey.toLowerCase());
      return k ? String(row[k]).trim() : '';
    };

    const name      = col('name');
    const type      = col('type');
    const status    = col('status');
    const startDate = getExact('start date') || col('startdate');
    const startTime = getExact('start time') || col('starttime');
    const endDate   = getExact('end date')   || col('enddate');
    const endTime   = getExact('end time')   || col('endtime');
    const paidHrs   = parseFloat(col('paid hours', 'paidhours')) || 0;
    const unpaidHrs = parseFloat(col('unpaid hours', 'unpaidhours')) || 0;
    const approvedBy = col('approved / denied by', 'approved by', 'approvedby', 'denied by');
    const message   = col('message', 'note', 'comment');

    const start = parseLocalDate(startDate);
    const end   = parseLocalDate(endDate);
    if (!name || !start || !end) return null;

    // Detect partial-day: start isn't midnight or end isn't 11:59 pm
    const startPartial = !isAllDayStart(startTime);
    const endPartial   = !isAllDayEnd(endTime);
    const isPartial    = startPartial || endPartial;

    return {
      name,
      type,
      status,
      start,
      end,
      startTime: fmtTime(startTime),
      endTime:   fmtTime(endTime),
      startPartial,
      endPartial,
      isPartial,
      paidHrs,
      unpaidHrs,
      approvedBy,
      message,
      source,
    };
  }).filter(Boolean);
}

// ── UI helpers ─────────────────────────────────────────────────────────────

function removeFile(name) {
  allRecords = allRecords.filter(r => r.source !== name);
  sourceFiles = sourceFiles.filter(f => f.name !== name);
  renderFileTags();
  rebuildFilters();
  updateSummaryBar();
  if (sourceFiles.length === 0) {
    document.getElementById('controls').style.display = 'none';
    document.getElementById('navBar').style.display = 'none';
    document.getElementById('summaryBar').style.display = 'none';
    document.getElementById('mainContent').innerHTML = '<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">No Reports Loaded</div><div class="empty-sub">Use the Upload button below to add one or more<br>time-off request exports.</div></div>';
  } else {
    render();
    saveToFirebase();
  }
}

function renderFileTags() {
  document.getElementById('fileTags').innerHTML = sourceFiles.map(f =>
    '<div class="file-tag">' + f.name.replace(/\.[^.]+$/, '') +
    ' <span class="remove" onclick="removeFile(\'' + f.name.replace(/'/g, "\\'") + '\')">×</span></div>'
  ).join('');
}

  { bg:'#fef9c3', fg:'#854d0e', border:'#eab308' },

  { bg:'#ffedd5', fg:'#9a3412', border:'#f97316' },
  { bg:'#cffafe', fg:'#155e75', border:'#06b6d4' },
  { bg:'#fae8ff', fg:'#86198f', border:'#d946ef' },
  { bg:'#d1fae5', fg:'#065f46', border:'#10b981' },
  { bg:'#fee2e2', fg:'#991b1b', border:'#ef4444' },

  { bg:'#fdf2f8', fg:'#9d174d', border:'#f472b6' },

  { bg:'#fefce8', fg:'#713f12', border:'#facc15' },

  { bg:'#fff7ed', fg:'#7c2d12', border:'#fb923c' },
];

let nameColorMap = {};
let colorIdx = 0;

function getColor(name) {
  if (nameColorMap[name] === undefined) nameColorMap[name] = colorIdx++;
  return EMPLOYEE_COLORS[nameColorMap[name] % EMPLOYEE_COLORS.length];
}

function rebuildFilters() {
  // Reset color map to stay consistent across reloads
  nameColorMap = {};
  colorIdx = 0;
  const sortedNames = [...new Set(allRecords.map(r => r.name))].sort();
  sortedNames.forEach(n => getColor(n)); // pre-assign in sorted order

  const names = sortedNames;
  const types = [...new Set(allRecords.map(r => r.type))].sort();

  const ns = document.getElementById('filterName');
  const cur = ns.value;
  ns.innerHTML = '<option value="">All employees</option>' + names.map(n => '<option value="' + n + '">' + n + '</option>').join('');
  ns.value = names.includes(cur) ? cur : '';

  const ts = document.getElementById('filterType');
  const curT = ts.value;
  ts.innerHTML = '<option value="">All types</option>' + types.map(t => '<option value="' + t + '">' + t + '</option>').join('');
  ts.value = types.includes(curT) ? curT : '';

  ns.onchange = ts.onchange = () => render();

  const leg = document.getElementById('employeeLegend');
  if (leg) {
    leg.innerHTML = names.map(n => {
      const col = getColor(n);
      const short = n.split(' ')[0] + ' ' + (n.split(' ').slice(-1)[0] || '');
      return '<div class="legend-item"><div class="legend-dot" style="background:' + col.border + '"></div>' + short + '</div>';
    }).join('');
  }
}

function getFiltered() {
  const name = document.getElementById('filterName').value;
  const type = document.getElementById('filterType').value;
  return allRecords.filter(r => (!name || r.name === name) && (!type || r.type === type));
}

function updateSummaryBar() {
  const bar = document.getElementById('summaryBar');
  if (!allRecords.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  const names = new Set(allRecords.map(r => r.name)).size;
  const totalHrs = allRecords.reduce((s, r) => s + r.paidHrs + r.unpaidHrs, 0);
  bar.innerHTML =
    '<div class="stat"><span class="stat-val">' + allRecords.length + '</span><span class="stat-label">Approved Requests</span></div>' +
    '<div class="stat"><span class="stat-val">' + names + '</span><span class="stat-label">Employees</span></div>' +
    '<div class="stat"><span class="stat-val">' + totalHrs.toLocaleString() + '</span><span class="stat-label">Total Hours Off</span></div>' +
    '<div class="stat"><span class="stat-val">' + sourceFiles.length + '</span><span class="stat-label">Report' + (sourceFiles.length !== 1 ? 's' : '') + ' Loaded</span></div>';
}

function showControls() {
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('navBar').style.display = 'flex';
  updateMonthLabel();
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  updateMonthLabel();
  render();
}

function updateMonthLabel() {
  document.getElementById('monthLabel').textContent = MONTHS[currentMonth] + ' ' + currentYear;
}

function setView(v) {
  currentView = v;
  document.getElementById('btnCal').classList.toggle('active', v === 'calendar');
  document.getElementById('btnList').classList.toggle('active', v === 'list');
  render();
}

function render() {
  if (currentView === 'calendar') renderCalendar();
  else renderList();
}

// ── Calendar rendering ─────────────────────────────────────────────────────

function renderCalendar() {
  const records = getFiltered();
  const today = new Date(); today.setHours(0,0,0,0);

  const firstDay    = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const prevDays    = new Date(currentYear, currentMonth, 0).getDate();

  // Build week arrays
  const weeks = [];
  let cells = [];
  for (let i = 0; i < firstDay; i++)
    cells.push(new Date(currentYear, currentMonth-1, prevDays - firstDay + 1 + i));
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push(new Date(currentYear, currentMonth, d));
    if (cells.length === 7) { weeks.push(cells); cells = []; }
  }
  if (cells.length) {
    let nm = 1;
    while (cells.length < 7) cells.push(new Date(currentYear, currentMonth+1, nm++));
    weeks.push(cells);
  }

  const inMonth = d => d.getMonth() === currentMonth && d.getFullYear() === currentYear;
  const GAP = 3, DAY_TOP = 28, LANE_H = 22, LANE_GAP = 2;

  function renderWeek(weekDates) {
    const weekStart = d0(weekDates[0]);
    const weekEnd   = d0(weekDates[6]);

    // Records overlapping this week
    const weekRecs = records.filter(r => d0(r.start) <= weekEnd && d0(r.end) >= weekStart);

    // Deduplicate by name+start+end
    const seen = new Set();
    const unique = weekRecs.filter(r => {
      const k = r.name + '|' + r.start + '|' + r.end;
      if (seen.has(k)) return false; seen.add(k); return true;
    });

    // Compute column spans
    const spans = unique.map(r => {
      const rs = d0(r.start), re = d0(r.end);
      let colStart = 0, colEnd = 6;
      for (let c = 0; c < 7; c++) {
        const cd = d0(weekDates[c]);
        if (cd < rs) colStart = c + 1;
        if (cd <= re) colEnd = c;
      }
      colStart = Math.max(colStart, 0);
      colEnd   = Math.min(colEnd, 6);
      return {
        r,
        colStart,
        colEnd,
        isStart: d0(r.start) >= weekStart && d0(r.start) <= weekEnd,
        isEnd:   d0(r.end)   >= weekStart && d0(r.end)   <= weekEnd,
      };
    }).filter(s => s.colStart <= s.colEnd);

    // Greedy lane packing
    const lanes = [];
    const laneAssign = spans.map(span => {
      for (let li = 0; li < lanes.length; li++) {
        if (!lanes[li].some(p => p.colStart <= span.colEnd && p.colEnd >= span.colStart)) {
          lanes[li].push(span); return li;
        }
      }
      lanes.push([span]);
      return lanes.length - 1;
    });

    const laneCount = lanes.length;
    const weekH = Math.max(112, DAY_TOP + laneCount * (LANE_H + LANE_GAP) + 8);

    // Day cells (background)
    const dayCells = weekDates.map(date => {
      const isOther = !inMonth(date);
      const isTod   = d0(date).getTime() === today.getTime();
      return '<div class="calendar-day' + (isOther ? ' other-month' : '') + (isTod ? ' today' : '') +
        '" style="min-height:' + weekH + 'px"><div class="day-num">' + date.getDate() + '</div></div>';
    }).join('');

    // Event bars (overlay)
    const CW = '(100% - 18px) / 7';
    const eventHtml = spans.map((span, si) => {
      const li   = laneAssign[si];
      const top  = DAY_TOP + li * (LANE_H + LANE_GAP);
      const cnt  = span.colEnd - span.colStart + 1;
      const iL   = span.isStart ? 3 : 0;
      const iR   = span.isEnd   ? 3 : 0;
      const left = span.colStart === 0
        ? iL + 'px'
        : 'calc(' + span.colStart + ' * (' + CW + ' + 3px) + ' + iL + 'px)';
      const width = cnt === 1
        ? 'calc(' + CW + ' - ' + (iL + iR) + 'px)'
        : 'calc(' + cnt + ' * (' + CW + ') + ' + ((cnt-1)*GAP) + 'px - ' + (iL+iR) + 'px)';
      const capClass = (span.isStart ? 'cap-start ' : '') + (span.isEnd ? 'cap-end' : '');
      const col = getColor(span.r.name);
      const firstName = span.r.name.split(' ')[0];
      const lastName  = span.r.name.split(' ').slice(-1)[0];
      const nm = firstName + ' ' + lastName;

      // Time label for partial-day events
      let timeBadge = '';
      if (span.r.isPartial) {
        let label = '';
        // startPartial = off starts mid-day → available BEFORE that time
        if (span.isStart && span.r.startPartial) label = 'avail. until ' + span.r.startTime;
        // endPartial = off ends mid-day → available AFTER that time
        else if (span.isEnd && span.r.endPartial) label = 'avail. after ' + span.r.endTime;
        if (label) timeBadge = '<span class="time-badge">(' + label + ')</span>';
      }

      const ridx = allRecords.indexOf(span.r);
      return '<div class="cal-event ' + capClass + '" ' +
        'style="position:absolute;top:' + top + 'px;left:' + left + ';width:' + width + ';pointer-events:all;' +
        'background:' + col.bg + ';color:' + col.fg + ';border-left-color:' + col.border + ';" ' +
        'data-ridx="' + ridx + '" onclick="handleCalClick(event)">' +
        nm + timeBadge + '</div>';
    }).join('');

    return '<div class="calendar-week" style="min-height:' + weekH + 'px">' +
      '<div style="position:absolute;inset:0;display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">' + dayCells + '</div>' +
      '<div style="position:absolute;inset:0;pointer-events:none;">' + eventHtml + '</div>' +
      '</div>';
  }

  let html = '<div class="calendar-grid"><div class="day-headers">' +
    DAYS.map(d => '<div class="day-header">' + d + '</div>').join('') +
    '</div><div class="calendar-weeks">';
  weeks.forEach(w => html += renderWeek(w));
  html += '</div></div>';
  document.getElementById('mainContent').innerHTML = html;
}

// ── List rendering ─────────────────────────────────────────────────────────

function renderList() {
  const records = getFiltered();
  if (!records.length) {
    document.getElementById('mainContent').innerHTML = '<div class="list-view"><p style="color:var(--muted);font-size:0.82rem;padding-top:8px;">No approved requests match the current filters.</p></div>';
    return;
  }
  const groups = {};
  records.forEach(r => {
    const key = MONTHS[r.start.getMonth()] + ' ' + r.start.getFullYear();
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });
  const sortedKeys = Object.keys(groups).sort((a, b) => new Date(a) - new Date(b));

  let html = '<div class="list-view">';
  sortedKeys.forEach(key => {
    const recs = groups[key].sort((a, b) => a.start - b.start);
    html += '<div class="list-month-group"><div class="list-month-title">' + key + '</div>' +
      '<div class="list-header"><span>Employee</span><span>Type</span><span>Start</span><span>End</span><span>Hours</span><span>Source</span></div>';
    recs.forEach(r => {
      const tc   = typeClass(r.type);
      const hrs  = r.paidHrs + r.unpaidHrs;
      // Start/end date + time for partial days
      const startStr = fmtShortDate(r.start) + (r.startPartial ? ' <span style="color:var(--red);font-size:0.72rem">from ' + r.startTime + '</span>' : '');
      const endStr   = fmtShortDate(r.end)   + (r.endPartial   ? ' <span style="color:var(--red);font-size:0.72rem">until ' + r.endTime   + '</span>' : '');
      const partialTag = r.isPartial ? '<span class="partial-badge">&#9200; Partial Day</span>' : '';
      const safeR = JSON.stringify(r).replace(/'/g, "\\'").replace(/</g, '&lt;').replace(/>/g, '&gt;');
      html += '<div class="list-row" onclick=\'showModal(JSON.parse(this.dataset.r));\' data-r=\'' + JSON.stringify(r).replace(/'/g, '&#39;') + '\'>' +
        '<span class="name-cell">' + r.name + partialTag + '</span>' +
        '<span><span class="type-badge ' + tc + '">' + r.type + '</span></span>' +
        '<span class="date-cell">' + startStr + '</span>' +
        '<span class="date-cell">' + endStr + '</span>' +
        '<span class="hours-cell">' + hrs + 'h</span>' +
        '<span class="src-cell">' + r.source.replace(/\.[^.]+$/, '') + '</span>' +
        '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;
}

// ── Modal ──────────────────────────────────────────────────────────────────

function handleCalClick(e) {
  const ridx = parseInt(e.currentTarget.getAttribute('data-ridx'));
  if (allRecords[ridx]) showModal(allRecords[ridx]);
}

function showModal(r) {
  // r.start/end may be strings (from data-r) or Date objects
  const start = r.start instanceof Date ? r.start : parseLocalDate(r.start);
  const end   = r.end   instanceof Date ? r.end   : parseLocalDate(r.end);
  const tc = typeClass(r.type);
  const hrs = (r.paidHrs || 0) + (r.unpaidHrs || 0);

  // Start / End display: include time if partial
  // startPartial: off starts mid-day → avail. until that time
  // endPartial:   off ends mid-day   → avail. after that time
  const startDisplay = fmtDate(start) + (r.startPartial && r.startTime ? ' (avail. until ' + r.startTime + ')' : '');
  const endDisplay   = fmtDate(end)   + (r.endPartial   && r.endTime   ? ' (avail. after ' + r.endTime   + ')' : '');
  const partialNote  = r.isPartial ? '<div class="modal-row"><span class="modal-label">Schedule</span><span class="modal-val" style="color:var(--red)">&#9200; Partial Day</span></div>' : '';

  document.getElementById('modalName').textContent = r.name;
  document.getElementById('modalBody').innerHTML =
    '<div class="modal-row"><span class="modal-label">Type</span><span class="modal-val"><span class="type-badge ' + tc + '">' + r.type + '</span></span></div>' +
    partialNote +
    '<div class="modal-row"><span class="modal-label">Start</span><span class="modal-val">' + startDisplay + '</span></div>' +
    '<div class="modal-row"><span class="modal-label">End</span><span class="modal-val">' + endDisplay + '</span></div>' +
    '<div class="modal-row"><span class="modal-label">Paid Hrs</span><span class="modal-val">' + (r.paidHrs || 0) + 'h</span></div>' +
    '<div class="modal-row"><span class="modal-label">Unpaid Hrs</span><span class="modal-val">' + (r.unpaidHrs || 0) + 'h</span></div>' +
    (r.approvedBy ? '<div class="modal-row"><span class="modal-label">Approved By</span><span class="modal-val">' + r.approvedBy + '</span></div>' : '') +
    (r.message    ? '<div class="modal-row"><span class="modal-label">Note</span><span class="modal-val">' + r.message + '</span></div>' : '') +
    '<div class="modal-row"><span class="modal-label">Source</span><span class="modal-val" style="color:var(--muted);font-size:0.72rem">' + r.source + '</span></div>';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('open');
});

function clearAll() {
  if (!confirm('Clear all loaded reports and saved data?')) return;
  allRecords = [];
  sourceFiles = [];
  nameColorMap = {};
  colorIdx = 0;
  db.ref(STORE_KEY).remove();
  renderFileTags();
  document.getElementById('controls').style.display = 'none';
  document.getElementById('navBar').style.display = 'none';
  document.getElementById('summaryBar').style.display = 'none';
  document.getElementById('employeeLegend').innerHTML = '';
  document.getElementById('mainContent').innerHTML = '<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">No Reports Loaded</div><div class="empty-sub">Use the Upload button below to add one or more<br>time-off request exports.</div></div>';
  showToast('All data cleared');
}

// Startup
loadFromFirebase();
